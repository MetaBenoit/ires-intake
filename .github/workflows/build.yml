name: Build

# Per-repo caller for the MetaBenoit reusable frontend build.
# Drop this at .github/workflows/build.yml in any frontend project repo.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   - VITE_SUPABASE_URL          (e.g., https://nycblvciyngndtqrvzqc.supabase.co)
#   - VITE_SUPABASE_ANON_KEY     (sb_publishable_..., public by design; RLS protects data)

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    uses: MetaBenoit/.github/.github/workflows/frontend-build.yml@main
    with:
      node-version: '20'
      working-directory: '.'
    secrets:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
